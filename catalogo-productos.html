<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Catálogo de Productos | Amarillo Primavera</title>
    <style>
      :root {
        color: #2a2119;
        background: #fbf5e8;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(255, 218, 124, 0.45), transparent 34rem),
          linear-gradient(135deg, #fffaf0 0%, #f7ead5 100%);
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 36px 0;
      }

      .header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 22px;
      }

      .kicker {
        margin: 0 0 8px;
        color: #b46c20;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(38px, 5vw, 68px);
        line-height: 0.95;
      }

      .count {
        padding: 10px 15px;
        border: 1px solid #ead6b7;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: #7a5125;
        font-weight: 750;
        white-space: nowrap;
      }

      .catalog {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 22px;
        align-items: start;
      }

      .panel {
        overflow: hidden;
        border: 1px solid #ead8bf;
        border-radius: 26px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 18px 50px rgba(75, 48, 16, 0.12);
      }

      .sidebar {
        position: sticky;
        top: 18px;
        max-height: calc(100vh - 36px);
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .search-wrap {
        padding: 16px;
        border-bottom: 1px solid #ead8bf;
        background: #fff8eb;
      }

      .search {
        width: 100%;
        padding: 13px 14px;
        border: 1px solid #e5cda8;
        border-radius: 16px;
        background: #fff;
        color: inherit;
        font: inherit;
        outline: none;
      }

      .search:focus {
        border-color: #cf8735;
        box-shadow: 0 0 0 4px rgba(207, 135, 53, 0.16);
      }

      .product-list {
        overflow: auto;
        padding: 10px;
      }

      .product-button {
        width: 100%;
        display: grid;
        gap: 4px;
        margin: 0 0 6px;
        padding: 12px 13px;
        border: 0;
        border-radius: 16px;
        background: transparent;
        color: inherit;
        text-align: left;
        cursor: pointer;
      }

      .product-button:hover,
      .product-button.is-active {
        background: #ffe8ba;
      }

      .product-name {
        font-weight: 800;
        line-height: 1.25;
      }

      .product-category {
        color: #8c6a42;
        font-size: 13px;
        font-weight: 700;
      }

      .detail {
        min-height: 640px;
        padding: 24px;
      }

      .detail-column {
        display: grid;
        gap: 14px;
      }

      .empty {
        min-height: 590px;
        display: grid;
        place-items: center;
        border: 2px dashed #ead8bf;
        border-radius: 20px;
        color: #8c6a42;
        text-align: center;
      }

      .detail-grid {
        display: grid;
        gap: 24px;
      }

      .gallery-layout {
        display: grid;
        grid-template-columns: 92px minmax(0, 1fr);
        gap: 14px;
        align-items: start;
      }

      .gallery-layout.has-one {
        grid-template-columns: 1fr;
      }

      .gallery-layout.is-editing {
        grid-template-columns: minmax(190px, 240px) minmax(0, 1fr);
      }

      .main-photo {
        overflow: hidden;
        border-radius: 22px;
        background: #f3eadb;
      }

      .main-photo img {
        display: block;
        width: 100%;
        height: min(620px, 70vh);
        object-fit: contain;
      }

      .thumbnails {
        display: flex;
        flex-direction: column;
        flex-wrap: nowrap;
        gap: 10px;
        margin: 0;
      }

      .thumbnail {
        width: 82px;
        overflow: hidden;
        aspect-ratio: 1;
        border: 2px solid #f1dfc4;
        border-radius: 14px;
        background: #f3eadb;
        cursor: pointer;
      }

      .thumbnail.is-active { border-color: #d89035; }

      .thumbnail img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .editable-images {
        display: grid;
        gap: 10px;
        margin: 0;
      }

      .editable-image {
        display: grid;
        grid-template-columns: 76px 1fr;
        gap: 10px;
        align-items: center;
        padding: 9px;
        border: 1px solid #ead8bf;
        border-radius: 16px;
        background: #fff8eb;
      }

      .editable-image img {
        display: block;
        width: 76px;
        aspect-ratio: 1;
        border-radius: 12px;
        object-fit: cover;
      }

      .image-name {
        overflow-wrap: anywhere;
        color: #6f573d;
        font-size: 13px;
        font-weight: 750;
      }

      .delete-image-button {
        grid-column: 1 / -1;
        padding: 9px 11px;
        border: 1px solid #e0a38d;
        border-radius: 999px;
        background: #fff0e9;
        color: #93411f;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        font-weight: 850;
      }

      .detail h2 {
        margin: 0 0 14px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(34px, 4vw, 54px);
        line-height: 0.98;
      }

      .pill {
        display: inline-flex;
        margin-bottom: 20px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #ffe7b8;
        color: #7a4512;
        font-size: 13px;
        font-weight: 800;
      }

      .description {
        margin: 0;
        color: #5f5143;
        font-size: 18px;
        line-height: 1.65;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 24px;
      }

      .tag {
        padding: 6px 10px;
        border: 1px solid #ead8bf;
        border-radius: 999px;
        background: #f6efe4;
        color: #846135;
        font-size: 13px;
        font-weight: 700;
      }

      .edit-form {
        display: grid;
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      .field label {
        color: #7a5125;
        font-size: 13px;
        font-weight: 850;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .field input,
      .field textarea {
        width: 100%;
        padding: 12px 13px;
        border: 1px solid #e5cda8;
        border-radius: 15px;
        background: #fffdf8;
        color: inherit;
        font: inherit;
        outline: none;
      }

      .field textarea {
        min-height: 132px;
        resize: vertical;
        line-height: 1.55;
      }

      .field input:focus,
      .field textarea:focus {
        border-color: #cf8735;
        box-shadow: 0 0 0 4px rgba(207, 135, 53, 0.16);
      }

      .actions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 4px;
      }

      .detail-actions {
        display: flex;
        justify-content: flex-end;
      }

      .save-button {
        padding: 12px 16px;
        border: 0;
        border-radius: 999px;
        background: #d89035;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 850;
      }

      .save-button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .secondary-button {
        padding: 12px 16px;
        border: 1px solid #e5cda8;
        border-radius: 999px;
        background: #fff8eb;
        color: #7a5125;
        cursor: pointer;
        font: inherit;
        font-weight: 850;
      }

      .save-status {
        color: #7a5125;
        font-size: 14px;
        font-weight: 750;
      }

      .error {
        padding: 14px;
        border-radius: 16px;
        background: #fff0e9;
        color: #93411f;
        font-weight: 700;
      }

      @media (max-width: 880px) {
        .header { align-items: start; flex-direction: column; }

        .catalog {
          grid-template-columns: 1fr;
        }

        .gallery-layout,
        .gallery-layout.is-editing {
          grid-template-columns: 78px minmax(0, 1fr);
        }

        .thumbnail { width: 72px; }

        .sidebar {
          position: static;
          max-height: 420px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="header">
        <div>
          <p class="kicker">Amarillo Primavera</p>
          <h1>Catálogo de productos</h1>
        </div>
        <div class="count" id="product-count">Cargando...</div>
      </header>

      <section class="catalog" aria-label="Catalogo de productos">
        <aside class="panel sidebar">
          <div class="search-wrap">
            <input class="search" id="search" type="search" placeholder="Buscar producto..." autocomplete="off">
          </div>
          <div class="product-list" id="product-list"></div>
        </aside>

        <div class="detail-column">
          <section class="panel detail" id="detail">
            <div class="empty">
              <p>Selecciona un producto de la lista para ver su detalle.</p>
            </div>
          </section>
          <div class="detail-actions" id="detail-actions"></div>
        </div>
      </section>
    </main>

    <script>
      const listEl = document.querySelector("#product-list");
      const detailEl = document.querySelector("#detail");
      const detailActionsEl = document.querySelector("#detail-actions");
      const countEl = document.querySelector("#product-count");
      const searchEl = document.querySelector("#search");

      let products = [];
      let activeSlug = "";
      let activeImages = [];
      let activeDescription = "";
      let detailRequestId = 0;

      const getActiveProduct = () => products.find((item) => item.slug === activeSlug);

      const escapeHtml = (value) => String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

      const parseDescription = (text) => {
        const match = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
        return match ? match[2].trim() : text.trim();
      };

      const renderList = () => {
        const query = searchEl.value.trim().toLowerCase();
        const filtered = products.filter((product) => {
          return product.nombre.toLowerCase().includes(query) || product.slug.toLowerCase().includes(query);
        });

        listEl.innerHTML = filtered.map((product) => `
          <button class="product-button ${product.slug === activeSlug ? "is-active" : ""}" data-slug="${escapeHtml(product.slug)}">
            <span class="product-name">${escapeHtml(product.nombre)}</span>
            <span class="product-category">${escapeHtml(product.categoria)}</span>
          </button>
        `).join("");
      };

      const loadImages = async (product) => {
        const response = await fetch(`${product.ruta}images/?v=${Date.now()}`);
        if (!response.ok) return [];

        const html = await response.text();
        const doc = new DOMParser().parseFromString(html, "text/html");
        return [...doc.querySelectorAll("a")]
          .map((link) => decodeURIComponent(link.getAttribute("href") || ""))
          .filter((href) => /\.(jpe?g|png|webp|gif)$/i.test(href))
          .sort()
          .map((href) => `${product.ruta}images/${href}`);
      };

      const renderGallery = (product, images) => {
        const mainImage = images[0];

        if (!mainImage) {
          return `<div class="empty"><p>Este producto no tiene imágenes disponibles.</p></div>`;
        }

        return `
          <div class="gallery-layout ${images.length > 1 ? "" : "has-one"}">
            ${images.length > 1 ? `
            <div class="thumbnails" aria-label="Imagenes del producto">
              ${images.map((image, index) => `
                <button class="thumbnail ${index === 0 ? "is-active" : ""}" data-image="${escapeHtml(image)}" type="button">
                  <img src="${escapeHtml(image)}" alt="${escapeHtml(product.nombre)}">
                </button>
              `).join("")}
            </div>
            ` : ""}
            <div class="main-photo">
              <img id="main-image" src="${escapeHtml(mainImage)}" alt="${escapeHtml(product.nombre)}">
            </div>
          </div>
        `;
      };

      const imageFilename = (image) => decodeURIComponent(image.split("/").pop() || "");

      const renderEditableImages = (product) => {
        if (!activeImages.length) {
          return `<div class="empty"><p>Este producto no tiene imágenes disponibles.</p></div>`;
        }

        return `
          <div class="gallery-layout is-editing">
            <div class="editable-images" aria-label="Editar imagenes del producto">
              ${activeImages.map((image) => `
                <div class="editable-image">
                  <img src="${escapeHtml(image)}" alt="${escapeHtml(product.nombre)}">
                  <span class="image-name">${escapeHtml(imageFilename(image))}</span>
                  <button class="delete-image-button" data-image="${escapeHtml(image)}" type="button">Eliminar</button>
                </div>
              `).join("")}
            </div>
            <div class="main-photo">
              <img id="main-image" src="${escapeHtml(activeImages[0])}" alt="${escapeHtml(product.nombre)}">
            </div>
          </div>
        `;
      };

      const renderReadOnlyDetail = () => {
        const product = getActiveProduct();
        if (!product) return;

        detailEl.innerHTML = `
          <div class="detail-grid">
            <div>${renderGallery(product, activeImages)}</div>
            <div>
              <p class="kicker">Amarillo Primavera</p>
              <h2>${escapeHtml(product.nombre)}</h2>
              <div class="pill">${escapeHtml(product.categoria)}</div>
              <p class="description">${escapeHtml(activeDescription)}</p>
              <div class="tags">
                ${(product.tags || []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
              </div>
            </div>
          </div>
        `;
        detailActionsEl.innerHTML = `<button class="save-button" id="edit-button" type="button">Editar</button>`;
      };

      const renderEditForm = () => {
        const product = getActiveProduct();
        if (!product) return;

        detailEl.innerHTML = `
          <div class="detail-grid">
            <div>${renderEditableImages(product)}</div>
            <div>
              <p class="kicker">Amarillo Primavera</p>
              <form class="edit-form" id="edit-form">
                <div class="field">
                  <label for="edit-name">Nombre</label>
                  <input id="edit-name" name="nombre" value="${escapeHtml(product.nombre)}" required>
                </div>
                <div class="field">
                  <label for="edit-category">Categoría</label>
                  <input id="edit-category" name="categoria" value="${escapeHtml(product.categoria)}" required>
                </div>
                <div class="field">
                  <label for="edit-description">Descripción</label>
                  <textarea id="edit-description" name="descripcion" required>${escapeHtml(activeDescription)}</textarea>
                </div>
                <div class="field">
                  <label for="edit-tags">Tags, uno por línea</label>
                  <textarea id="edit-tags" name="tags">${escapeHtml((product.tags || []).join("\n"))}</textarea>
                </div>
                <div class="actions">
                  <button class="save-button" type="submit">Guardar cambios</button>
                  <button class="secondary-button" id="cancel-edit" type="button">Cancelar</button>
                  <span class="save-status" id="save-status"></span>
                </div>
              </form>
            </div>
          </div>
        `;
        detailActionsEl.innerHTML = "";
      };

      const renderDetail = async (slug) => {
        const product = products.find((item) => item.slug === slug);
        if (!product) return;

        const requestId = ++detailRequestId;
        activeSlug = slug;
        renderList();
        detailEl.innerHTML = `<div class="empty"><p>Cargando detalle...</p></div>`;
        detailActionsEl.innerHTML = "";

        try {
          const [descriptionResponse, images] = await Promise.all([
            fetch(`${product.ruta}description.md?v=${Date.now()}`),
            loadImages(product),
          ]);

          const descriptionText = descriptionResponse.ok ? await descriptionResponse.text() : "";
          const description = parseDescription(descriptionText);

          if (requestId !== detailRequestId || activeSlug !== slug) return;

          activeImages = images;
          activeDescription = description;
          renderReadOnlyDetail();
        } catch (error) {
          detailEl.innerHTML = `<div class="error">No se pudo cargar el detalle del producto.</div>`;
        }
      };

      listEl.addEventListener("click", (event) => {
        const button = event.target.closest(".product-button");
        if (button) renderDetail(button.dataset.slug);
      });

      detailEl.addEventListener("click", (event) => {
        const thumbnail = event.target.closest(".thumbnail");
        if (!thumbnail) return;

        const mainImage = document.querySelector("#main-image");
        mainImage.src = thumbnail.dataset.image;
        detailEl.querySelectorAll(".thumbnail").forEach((item) => item.classList.remove("is-active"));
        thumbnail.classList.add("is-active");
      });

      detailActionsEl.addEventListener("click", (event) => {
        if (event.target.closest("#edit-button")) renderEditForm();
      });

      detailEl.addEventListener("click", (event) => {
        if (event.target.closest("#cancel-edit")) {
          renderReadOnlyDetail();
        }
      });

      detailEl.addEventListener("click", async (event) => {
        const button = event.target.closest(".delete-image-button");
        if (!button || !activeSlug) return;

        const product = getActiveProduct();
        const image = button.dataset.image;
        const filename = imageFilename(image);

        if (!confirm(`¿Eliminar esta imagen?\n${filename}`)) return;

        button.disabled = true;
        button.textContent = "Eliminando...";

        try {
          const response = await fetch(`api/products/${encodeURIComponent(activeSlug)}/images/${encodeURIComponent(filename)}`, {
            method: "DELETE",
          });
          const result = await response.json();

          if (!response.ok || !result.ok) {
            throw new Error(result.error || "No se pudo eliminar la imagen");
          }

          activeImages = activeImages.filter((item) => imageFilename(item) !== filename);
          product.num_imagenes = result.num_imagenes;
          renderEditForm();
        } catch (error) {
          button.disabled = false;
          button.textContent = "Eliminar";
          alert(`Error: ${error.message}`);
        }
      });

      detailEl.addEventListener("submit", async (event) => {
        const form = event.target.closest("#edit-form");
        if (!form || !activeSlug) return;

        event.preventDefault();
        const saveButton = form.querySelector(".save-button");
        const saveStatus = form.querySelector("#save-status");
        const product = products.find((item) => item.slug === activeSlug);
        const payload = {
          nombre: form.nombre.value.trim(),
          categoria: form.categoria.value.trim(),
          descripcion: form.descripcion.value.trim(),
          tags: form.tags.value.split("\n").map((tag) => tag.trim()).filter(Boolean),
        };

        saveButton.disabled = true;
        saveStatus.textContent = "Guardando...";

        try {
          const response = await fetch(`api/products/${encodeURIComponent(activeSlug)}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const result = await response.json();

          if (!response.ok || !result.ok) {
            throw new Error(result.error || "No se pudo guardar");
          }

          Object.assign(product, payload);
          activeDescription = payload.descripcion;
          saveStatus.textContent = "Cambios guardados.";
          renderList();
          setTimeout(renderReadOnlyDetail, 500);
        } catch (error) {
          saveStatus.textContent = `Error: ${error.message}`;
        } finally {
          saveButton.disabled = false;
        }
      });

      searchEl.addEventListener("input", renderList);

      fetch(`products/index.json?v=${Date.now()}`)
        .then((response) => response.json())
        .then((index) => {
          products = Object.values(index).sort((a, b) => a.nombre.localeCompare(b.nombre, "es"));
          countEl.textContent = `${products.length} productos`;
          renderList();
        })
        .catch(() => {
          countEl.textContent = "Error";
          listEl.innerHTML = `<div class="error">No se pudo cargar products/index.json.</div>`;
        });
    </script>
  </body>
</html>
